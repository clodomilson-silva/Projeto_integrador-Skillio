services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: skillio_db
      POSTGRES_USER: skillio_user
      POSTGRES_PASSWORD: skillio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillio_user -d skillio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://skillio_user:skillio_password@db:5432/skillio_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-change-this-in-production
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
