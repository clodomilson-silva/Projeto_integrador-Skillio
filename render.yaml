# Render Blueprint - Deploy Completo do Projeto Skillio
# ======================================================
# Este arquivo configura TUDO automaticamente no Render:
# - PostgreSQL Database
# - Redis (para Celery)
# - Backend Django API
# - Frontend React/Vite

databases:
  - name: skillio-db
    databaseName: skillio_db
    user: skillio_user
    plan: free
    region: oregon

services:
  # ===== REDIS (Para Celery/Cache) =====
  - type: redis
    name: skillio-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
    region: oregon

  # ===== BACKEND DJANGO API =====
  - type: web
    name: skillio-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DEBUG
        value: False
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skillio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: skillio-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DB_PASSWORD
        sync: false
    healthCheckPath: /api/health/
    autoDeploy: true

  # ===== FRONTEND REACT/VITE =====
  - type: web
    name: skillio-frontend
    runtime: static
    plan: free
    buildCommand: |
      cd Frontend
      npm install
      npm run build
    staticPublishPath: ./Frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: skillio-backend
          envVarKey: RENDER_EXTERNAL_URL
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

  # ===== CELERY WORKER (Background Tasks) =====
  - type: worker
    name: skillio-celery
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: cd backend && celery -A core worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: skillio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: skillio-redis
          property: connectionString
    autoDeploy: true
